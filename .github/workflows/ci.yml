name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: jobmarket_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      ENV: test
      DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/jobmarket_test
      TEST_DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/jobmarket_test
    steps:
      - name: Check out code
        uses: actions/checkout@v5

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint
        run: ruff check .

      - name: Format check
        run: ruff format --check .

      - name: Type check
        run: mypy app

      - name: Run migrations
        run: alembic upgrade head

      - name: Run tests
        run: pytest --tb=short
